<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PrepBot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>


<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <div class="w-full max-w-2xl h-[600px] bg-gray-800 rounded-2xl shadow-lg flex flex-col">
        <!-- HEADER -->
        <div class="p-4 border-b border-gray-700 flex justify-between items-center">
            <div class="text-lg font-semibold">
                PrepBot - Your Placement Assistant
            </div>

            <!-- THREE DOT MENU -->
            <div class="relative">
                <button onclick="toggleMenu()" class="text-2xl px-2">
                    ⋮
                </button>
                <div id="menu" class="hidden absolute right-0 mt-2 bg-gray-700 rounded-lg shadow-lg">
                    <button onclick="clearChat()" class="px-4 py-2 hover:bg-gray-600 rounded-lg">
                        Clear Chat
                    </button>
                </div>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-3">
        </div>

        <!-- INPUT -->
        <div class="p-4 border-t border-gray-700 flex gap-2">
            <input id="userInput" type="text" class="flex-1 p-2 rounded-lg bg-gray-700 outline-none"
                placeholder="Ask something..." />
            <button onclick="sendMessage()" class="bg-blue-500 px-4 py-2 rounded-lg hover:bg-blue-600">
                Send
            </button>
        </div>
    </div>
    <script>

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const message = input.value.trim();
            if (!message) return;
            addMessage("You", message);
            input.value = "";
            const typing = addMessage("PrepBot", "Typing...");
            const res = await fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: message
                })
            });
            const data = await res.json();
            typing.remove();
            addMessage(
                "PrepBot",
                data.response
            );
        }

        // ENTER KEY SEND

        document
            .getElementById("userInput")
            .addEventListener("keypress", function (event) {
                if (event.key === "Enter") {
                    sendMessage();
                }
            });

        function addMessage(sender, text) {
            const chatBox = document.getElementById("chatBox");
            const msg = document.createElement("div");
            msg.className = sender === "You" ? "text-right" : "text-left";
            msg.innerHTML = `


    <div class="inline-block px-4 py-2 rounded-lg
    ${sender === "You"
                    ? "bg-blue-500"
                    : "bg-gray-700"
                }">

        <strong>${sender}:</strong> ${text}

    </div>


    `;



            chatBox.appendChild(msg);



            chatBox.scrollTop =
                chatBox.scrollHeight;





            // SAVE HISTORY EXCEPT TYPING

            if (text !== "Typing...") {


                let history =
                    JSON.parse(
                        localStorage.getItem("chatHistory")
                    )
                    || [];



                history.push({

                    sender: sender,

                    text: text

                });



                localStorage.setItem(

                    "chatHistory",

                    JSON.stringify(history)
                );
            }
            return msg;
        }

        function toggleMenu() {

            const menu =
                document.getElementById("menu");
                menu.classList.toggle("hidden");
        }

        function clearChat() {


            document
                .getElementById("chatBox")
                .innerHTML = "";

            localStorage.removeItem(
                "chatHistory"
            );
        }

        // LOAD OLD CHAT

        window.onload = function () {

            const history =

                JSON.parse(
                    localStorage.getItem("chatHistory")
                )
                || [];

            if (history.length === 0) {


                addMessage(
                    "PrepBot",
                    "Hi! I'm PrepBot. Ready for placement preparation?"
                );


            }

            else {


                history.forEach(msg => {


                    const chatBox =
                        document.getElementById("chatBox");



                    const div =
                        document.createElement("div");



                    div.className =
                        msg.sender === "You"
                            ? "text-right"
                            : "text-left";



                    div.innerHTML = `
            <div class="inline-block px-4 py-2 rounded-lg
            ${msg.sender === "You" ? "bg-blue-500" : "bg-gray-700"}">
            <strong>${msg.sender}:</strong>
            ${msg.text}
            </div>
            `;
                    chatBox.appendChild(div);
                });
            }
        }
    </script>
</body>

</html>
