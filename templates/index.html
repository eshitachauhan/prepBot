<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>PrepBot</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-900 text-white flex items-center justify-center h-screen">
        <div class="w-full max-w-2xl bg-gray-800 rounded-2xl shadow-lg flex flex-col">
            
            <div class="p-4 border-b border-gray-700 text-lg fornt-semibold">
                PrepBot - Your placement assistent
            </div>

            <div id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-3"></div>
            <div class="p-4 border-t border-gray-700 flex gap-2">
                <input id="userInput" type="text"
                class="flex-1 p-2 rounded-lg bg-gray-700 outline-none"
                placeholder="Ask something..."/>
                <button onclick="sendMessage()" class="bg-blue-500 px-4 py-2 rounded-lg hover:bg-blue-600">
                    Send
                </button>
            </div>

        </div>
        
        <script>
            async function sendMessage() {
                const input = document.getElementById("userInput");
                console.log("INPUT ELEMENT:", input);
                const message = input.value.trim();
                if(!message) return;
                addMessage("You", message);
                input.value = "";

                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({message: message})
                });

                const data = await res.json();
                addMessage("Bot", data.response);
            }

            function addMessage(sender, text){
                const chatBox = document.getElementById("chatBox");
                const msg = document.createElement("div");
                msg.className = sender === "You" ? "text-right" : "text-left";
                msg.innerHTML = `
                    <div class="inline-block px-4 py-2 rounded-lg ${
                        sender === "You" ? "bg-blue-500" : "bg-gray-700"
                    }">
                        <strong>${sender}:</strong> ${text}
                    </div>
                `;
                chatBox.appendChild(msg);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        </script>
    </body>
</html>
