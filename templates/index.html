<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>PrepBot</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <button onclick="clearChat()" class="bg-red-500 py-1 rounded-lg text-sm">
            Clear Chat
        </button>
    </head>
    <body class="bg-gray-900 text-white flex items-center justify-center h-screen">
        <div class="w-full max-w-2xl bg-gray-800 rounded-2xl shadow-lg flex flex-col">
            
            <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                PrepBot - Your Placement Assistent
            </div>

            <div class="relative">
                <button onclick="toggleMenu()" class="text-xl">
                    ⋮
                </button>
                
                <div id="menu" class="hidden absolute right-0 mt-2 bg-gray-700 rounded-lg">
                    <button onclick="clearChat()" class="px-4 py-2 hover:bg-gray-600">
                        Clear Chat
                    </button>
                </div>

            </div>

            <div id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-3"></div>
            <div class="p-4 border-t border-gray-700 flex gap-2">
                <input id="userInput" type="text"
                class="flex-1 p-2 rounded-lg bg-gray-700 outline-none"
                placeholder="Ask something..."/>
                <button onclick="sendMessage()" class="bg-blue-500 px-4 py-2 rounded-lg hover:bg-blue-600">
                    Send
                </button>
            </div>

        </div>
        
        <script>
            async function sendMessage() {
                const input = document.getElementById("userInput");
                const message = input.value.trim();
                if(!message) return;
                addMessage("You", message);
                input.value = "";

                const typing = addMessage("PrepBot", "Typing...");
                const res = await fetch("/chat",{
                    method: "POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify({
                        message: message
                    })
                });

                const data = await res.json();
                typing.remove();
                addMessage("PrepBot", data.response);
            }

            document.getElementById("userInput")
            .addEventListener("keypress", function(event){
                if(event.key === "Enter"){
                    sendMessage();
                }
            });

            function addMessage(sender, text){
                const chatBox = document.getElementById("chatBox");
                const msg = document.createElement("div");
                msg.className = sender === "You" ? "text-right" : "text-left";
                msg.innerHTML = `
                    <div class="inline-block px-4 py-2 rounded-lg ${
                        sender === "You" ? "bg-blue-500" : "bg-gray-700"
                    }">
                        <strong>${sender}:</strong> ${text}
                    </div>
                `;
                chatBox.appendChild(msg);
                chatBox.scrollTop = chatBox.scrollHeight;

                if(text !== "Typing..."){
                    let history = JSON.parse(localStorage.getItem("chatHistory")) || [];
                    history.push({
                        sender,
                        text
                    });
                    localStorage.setItem(
                        "chatHistory",
                        JSON.stringify(history)
                    );
                }

                return msg;
            }

            function toggleMenu(){
                const menu = document.getElementById("menu");
                menu.classList.toggle("hidden");
            }

            function clearChat(){
                localStorage.removeItem("chatHistory");
                document.getElementById("chatBox").innerHTML = "";
            }

            window.onload = function() {
                /*addMessage("Bot", "Hi! I'm PrepBot.");*/
                const history = JSON.parse(localStorage.getItem("chatHistory")) || [];
                history.forEach(msg => {
                    const chatBox = document.getElementById("chatBpx");
                    const div = document.createElement("div");
                    div.className = msg.sender === "You" ? "text-right" : "text-left";
                    div.innerHTML = `
                        <div class= "inline-block px-4 py-2 rounded-lg ${
                            msg.sender === "You" ? "bg-blue-500" : "bg-gray-700"
                        }">
                            <strong>${msg.sender}:</strong> ${msg.text}
                        </div>
                    `;
                    chatBox.appendChild(div);
                });
                if(history.length === 0){
                    addMessage("Bot", "Hi! I'm PrepBot.")
                }
            };

        </script>
    </body>
</html>
